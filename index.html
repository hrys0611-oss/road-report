<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>故障報告一覧</title>
<style>
body {
  font-family: sans-serif;
}
table {
  border-collapse: collapse;
  width: 100%;
}
td, th {
  border: 1px solid #ccc;
  padding: 5px;
  font-size: 12px;
}
</style>
</head>
<body>

<h2>故障報告一覧</h2>
<table id="table"></table>

<script>
fetch("data.csv")
  .then(res => res.text())
  .then(text => {
    const rows = text.split("\n");
    let html = "";

    rows.forEach((row, index) => {
      const cols = row.split(",");
      html += "<tr>";

      cols.forEach(col => {
        if(index === 0){
          html += "<th>" + col + "</th>";
        } else {
          html += "<td>" + col + "</td>";
        }
      });

      html += "</tr>";
    });

    document.getElementById("table").innerHTML = html;
  });
</script>

</body>
</html>
