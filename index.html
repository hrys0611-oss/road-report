<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>故障報告一覧</title>

<style>
body {
  font-family: sans-serif;
  margin: 10px;
}

h2 {
  font-size: 18px;
}

/* 検索 */
input {
  margin-bottom: 10px;
  padding: 6px;
  width: 100%;
  font-size: 14px;
}

/* 横スクロール */
.table-container {
  overflow-x: auto;
  border: 1px solid #ccc;
}

/* 表 */
table {
  border-collapse: collapse;
  width: 100%;
  font-size: 12px;
}

/* ヘッダー固定 */
th {
  background-color: #333;
  color: white;
  position: sticky;
  top: 0;
  z-index: 1;
}

/* セル */
td, th {
  border: 1px solid #ccc;
  padding: 6px;
  white-space: nowrap;
}

/* 行カラー */
tr:nth-child(even) {
  background-color: #f5f5f5;
}

/* ホバー */
tr:hover {
  background-color: #ddd;
}
</style>

</head>
<body>

<h2>故障報告一覧</h2>

<input type="text" id="search" placeholder="検索（車名・登録番号など）">

<div class="table-container">
  <table id="table"></table>
</div>

<script>
let allRows = [];

// CSV読み込み
fetch("data.csv")
  .then(res => res.arrayBuffer())
  .then(buffer => {
    const text = new TextDecoder("utf-8").decode(buffer);

    const rows = text.split(/\r?\n/).filter(r => r);

    // ヘッダー
    const header = rows[0];

    // データ（最新順に）
    const data = rows.slice(1).reverse();

    allRows = [header, ...data];

    renderTable(allRows);
  });

// 表描画
function renderTable(rows) {
  let html = "";

  rows.forEach((row, index) => {

    // カンマ・セミコロン・タブ全部対応
    const cols = row.split(/,|;|\t/);

    html += "<tr>";

    cols.forEach(col => {
      col = col.replace(/^"|"$/g, "");

      if(index === 0){
        html += "<th>" + col + "</th>";
      } else {
        html += "<td>" + col + "</td>";
      }
    });

    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
}

// 検索
document.getElementById("search").addEventListener("keyup", function() {
  const keyword = this.value.toLowerCase();

  const filtered = allRows.filter((row, index) => {
    if(index === 0) return true;
    return row.toLowerCase().includes(keyword);
  });

  renderTable(filtered);
});
</script>

</body>
</html>
