<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>故障報告一覧</title>

<style>
body {
  font-family: sans-serif;
  margin: 10px;
}

h2 {
  font-size: 18px;
}

input {
  margin-bottom: 10px;
  padding: 6px;
  width: 100%;
  font-size: 14px;
}

.table-container {
  overflow-x: auto;
  border: 1px solid #ccc;
}

table {
  border-collapse: collapse;
  width: 100%;
  font-size: 14px;
}

th {
  background-color: #333;
  color: white;
  position: sticky;
  top: 0;
}

td, th {
  border: 1px solid #ccc;
  padding: 8px;
  white-space: nowrap;
}

tr:nth-child(even) {
  background-color: #f5f5f5;
}
</style>

</head>
<body>

<h2>故障報告一覧</h2>

<input type="text" id="search" placeholder="検索（車名・車番など）">

<div class="table-container">
  <table id="table"></table>
</div>

<script>
let allRows = [];

// 表示する列（ここがポイント）
const showColumns = [6, 7, 9, 13];

fetch("data.csv")
  .then(res => res.arrayBuffer())
  .then(buffer => {
    const text = new TextDecoder("utf-8").decode(buffer);
    const rows = text.split(/\r?\n/).filter(r => r);

    const header = rows[0];
    const data = rows.slice(1).reverse();

    allRows = [header, ...data];

    renderTable(allRows);
  });

function renderTable(rows) {
  let html = "";

  rows.forEach((row, index) => {
    const cols = row.split(/,|;|\t/);

    html += "<tr>";

    showColumns.forEach(i => {
      let col = cols[i] || "";
      col = col.replace(/^"|"$/g, "");

      if(index === 0){
        html += "<th>" + col + "</th>";
      } else {
        html += "<td>" + col + "</td>";
      }
    });

    html += "</tr>";
  });

  document.getElementById("table").innerHTML = html;
}

// 検索
document.getElementById("search").addEventListener("keyup", function() {
  const keyword = this.value.toLowerCase();

  const filtered = allRows.filter((row, index) => {
    if(index === 0) return true;
    return row.toLowerCase().includes(keyword);
  });

  renderTable(filtered);
});
</script>

</body>
</html>
