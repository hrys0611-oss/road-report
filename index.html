<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>故障報告一覧</title>
<style>
body {
  font-family: sans-serif;
}
table {
  border-collapse: collapse;
  width: 100%;
}
td, th {
  border: 1px solid #ccc;
  padding: 5px;
  font-size: 12px;
}
<script>
fetch("data.csv")
  .then(res => res.arrayBuffer())
  .then(buffer => {
    const text = new TextDecoder("utf-8").decode(buffer);

    const rows = text.split(/\r?\n/);
    let html = "";

    rows.forEach((row, index) => {
      if (!row) return;

      const cols = row.split(",");
      html += "<tr>";

      cols.forEach(col => {
        col = col.replace(/^"|"$/g, "");

        if(index === 0){
          html += "<th>" + col + "</th>";
        } else {
          html += "<td>" + col + "</td>";
        }
      });

      html += "</tr>";
    });

    document.getElementById("table").innerHTML = html;
  });
</script>
</body>
</html>
