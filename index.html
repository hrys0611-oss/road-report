<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>テスト</title>
</head>
<body>

<h2>テスト表示</h2>
<div id="test">読み込み中...</div>

<script>
fetch("data.csv")
  .then(res => res.text())
  .then(text => {
    document.getElementById("test").innerText = text;
  })
  .catch(err => {
    document.getElementById("test").innerText = "エラー：" + err;
  });
</script>

</body>
</html>
